# Netlify Configuration for AI Dev Team Labs

[build]
  # Build command (if needed - we're serving static files)
  command = "echo 'No build needed for static site'"
  publish = "landing-page"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { CLAUDE_API_KEY = "" }

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
